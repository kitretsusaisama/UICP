groups:
  - name: uicp.alerts
    rules:
      # Critical: Circuit breaker open for MySQL or Redis
      - alert: UicpCircuitBreakerOpen
        expr: uicp_circuit_breaker_state{name=~"mysql|redis"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker {{ $labels.name }} is OPEN"
          description: >
            The {{ $labels.name }} circuit breaker has been OPEN for more than 1 minute.
            All calls to this dependency are failing fast. Check the dependency health
            and review recent error logs.
          runbook: "https://wiki.internal/uicp/runbooks/circuit-breaker-open"

      # Critical: High 5xx error rate
      - alert: UicpHighErrorRate
        expr: rate(uicp_errors_total{http_status=~"5.."}[5m]) > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 10/s for 2 minutes"
          description: >
            The UICP is returning 5xx errors at a rate exceeding 10 per second,
            sustained for 2 minutes. Investigate recent deployments, dependency
            health, and error logs.
          runbook: "https://wiki.internal/uicp/runbooks/high-error-rate"

      # Warning: ACCOUNT_TAKEOVER threat score spike
      - alert: UicpThreatScoreSpike
        expr: uicp_soc_alerts_total{kill_chain_stage="ACCOUNT_TAKEOVER"} > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Multiple ACCOUNT_TAKEOVER alerts in 5 minutes"
          description: >
            More than 5 ACCOUNT_TAKEOVER SOC alerts have been generated in the last
            5 minutes. This may indicate a coordinated credential stuffing or
            account takeover campaign. Review the SOC dashboard immediately.
          runbook: "https://wiki.internal/uicp/runbooks/threat-score-spike"

      # Warning: Outbox DLQ growing
      - alert: UicpOutboxDlqGrowing
        expr: increase(uicp_outbox_dlq_total[10m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Outbox DLQ receiving > 10 events in 10 minutes"
          description: >
            The outbox dead-letter queue is growing — more than 10 events have
            failed all 5 delivery attempts in the last 10 minutes. Check the
            BullMQ worker logs and downstream consumers for errors.
          runbook: "https://wiki.internal/uicp/runbooks/outbox-dlq-growing"

      # Warning: DB connection pool exhaustion
      - alert: UicpDbPoolExhausted
        expr: uicp_db_pool_waiting > 20
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "DB connection pool has > 20 waiting requests"
          description: >
            More than 20 requests are waiting for a database connection. The pool
            may be undersized or there may be slow queries holding connections.
            Review pool configuration (max: 20) and slow query logs.
          runbook: "https://wiki.internal/uicp/runbooks/db-pool-exhausted"
