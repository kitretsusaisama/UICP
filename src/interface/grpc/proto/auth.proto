syntax = "proto3";

package auth;

// Internal service-to-service auth operations.
// Used by downstream microservices to validate tokens and check permissions
// without making HTTP calls — lower latency, binary protocol.
// Section 17.7 of the design document.

service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  rpc GetUserClaims(GetUserClaimsRequest) returns (GetUserClaimsResponse);
}

// ── ValidateToken ──────────────────────────────────────────────────────────

message ValidateTokenRequest {
  string token = 1;
  repeated string required_scopes = 2;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string tenant_id = 3;
  string session_id = 4;
  repeated string roles = 5;
  repeated string permissions = 6;
  bool mfa_verified = 7;
  // Populated only when valid=false
  string error_code = 8;
  string principal_id = 9;
  string membership_id = 10;
  string actor_id = 11;
  string policy_version = 12;
  string manifest_version = 13;
  repeated string capabilities = 14;
}

// ── CheckPermission ────────────────────────────────────────────────────────

message CheckPermissionRequest {
  string user_id = 1;
  string tenant_id = 2;
  string resource_type = 3;
  string resource_id = 4;
  string action = 5;
  map<string, string> context = 6;
}

message CheckPermissionResponse {
  bool allowed = 1;
  string matched_policy_id = 2;
  // "role:admin" | "abac:policy-uuid" | "implicit_deny"
  string decision_reason = 3;
}

// ── GetUserClaims ──────────────────────────────────────────────────────────

message GetUserClaimsRequest {
  string user_id = 1;
  string tenant_id = 2;
}

message GetUserClaimsResponse {
  bool found = 1;
  string user_id = 2;
  string tenant_id = 3;
  string status = 4;
  repeated string roles = 5;
  repeated string permissions = 6;
  bool mfa_enabled = 7;
  string error_code = 8;
  string principal_id = 9;
  string membership_id = 10;
  string actor_id = 11;
  repeated string capabilities = 12;
}
